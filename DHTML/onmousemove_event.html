<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic HTML Event Model - onmousemove Event</title>

    <script>
        function updateMouseCoordinates(event) {
            var dispCoord = document.getElementById("dispCoord");
            dispCoord.innerText = "(" + event.offsetX + "," + event.offsetY + ")";
        }
    </script>
</head>

<body onmousemove="updateMouseCoordinates(event)">

    <h1>This page will show the mouse coordinates as shown below:</h1>

    <p id="dispCoord">(0,0)</p>

</body>
</html>
