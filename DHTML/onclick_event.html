<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic HTML Event Model - onclick Event</title>

    <script type="text/javascript">
        function handleClick() {
            alert("Text in paragraph is clicked!!!");
        }
    </script>
</head>

<body>

    <p id="writeText" onclick="handleClick()">Click on this text</p>

    <input type="button" value="Click me!" 
           onclick="alert('Button on the web page is clicked')">

</body>
</html>
