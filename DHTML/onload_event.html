<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic HTML Event Model - onload Event</title>

    <script>
        function callme() {
            alert("This will appear each time the page loads!!!");
        }
    </script>
</head>

<body onload="callme()">

    <h1>This page has an alert box on load event. Try refreshing the page again.</h1>

</body>
</html>
