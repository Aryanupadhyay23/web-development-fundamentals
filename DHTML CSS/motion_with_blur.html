<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Blur Control</title>

	<script>
		function callblur() {
			const strength = parseInt(document.getElementById("stren").value) || 0;
			const img = document.getElementById("myimg");

			img.style.filter = `blur(${strength}px)`;
		}
	</script>
</head>

<body>

	<label>Blur Strength:</label>
	<input type="range" id="stren" min="0" max="20" value="0" oninput="callblur()">

	<br><br>

	<img id="myimg" src="download.jfif" alt="image" width="300">

</body>
</html>
