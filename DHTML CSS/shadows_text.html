<!DOCTYPE html>
<html>
<head>
    <title>Text Shadow</title>
    <style>
        .shadow1 {
            text-shadow: 2px 2px 5px red;
        }

        .shadow2 {
            text-shadow: -2px -2px 5px blue;
        }

        .shadow3 {
            text-shadow: 0px 0px 10px green;
        }
    </style>
</head>
<body>

    <h1 class="shadow1">Red Shadow</h1>
    <h1 class="shadow2">Blue Shadow</h1>
    <h1 class="shadow3">Glow Effect</h1>

</body>
</html>
