<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Glowing Text</title>

	<style>
		.glow {
			position: absolute;
			left: 20px;
			top: 40px;
			padding: 5px;
			font-size: 24px;
			color: black;

			/* Glow effect */
			text-shadow: 0 0 5px green,
						 0 0 10px green,
						 0 0 15px green;
		}
	</style>
</head>

<body>

	<p class="glow">
		Department of Computer Science & Application <br>
		Kurukshetra University, Kurukshetra
	</p>

</body>
</html>
