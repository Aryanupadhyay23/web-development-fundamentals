<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Wave Text</title>

	<style>
		body {
			text-align: center;
			margin-top: 100px;
			font-family: Arial, sans-serif;
		}

		.wave span {
			display: inline-block;
			font-size: 2em;
			animation: wave 1s infinite;
		}

		.wave span:nth-child(1) { animation-delay: 0s; }
		.wave span:nth-child(2) { animation-delay: 0.1s; }
		.wave span:nth-child(3) { animation-delay: 0.2s; }
		.wave span:nth-child(4) { animation-delay: 0.3s; }
		.wave span:nth-child(5) { animation-delay: 0.4s; }
		.wave span:nth-child(6) { animation-delay: 0.5s; }

		@keyframes wave {
			0%   { transform: translateY(0px); }
			50%  { transform: translateY(-10px); }
			100% { transform: translateY(0px); }
		}
	</style>
</head>

<body>

	<h1>This page has wavy text...!!!</h1>

	<div class="wave">
		<span>D</span><span>e</span><span>p</span><span>a</span><span>r</span><span>t</span>
		<span>m</span><span>e</span><span>n</span><span>t</span>
	</div>

</body>
</html>
