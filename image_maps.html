<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ImageMap Example</title>
</head>

<body>

<p>Below is a single image with two image maps.</p>

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSO0EIywpIgO9ADH_kqzKTstJd9YnKMF7eUow&s"
     usemap="#First"
     alt="Google Yahoo">

<map name="First">

<area shape="rect"
coords="0,0,398,134"
href="https://www.google.co.in"
alt="Google">

<area shape="rect"
coords="0,134,398,268"
href="https://www.yahoo.com"
alt="Yahoo">

</map>

</body>
</html>
