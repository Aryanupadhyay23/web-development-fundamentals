<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cascading Style Sheet -Inline</title>
</head>
<body>
	<p>This paragraph does not have any style applied to it.</p>
    <p style="font-size:24pt">This paragraph has the <em>font-size</em> style applied to it, making it 24pt.</p>
    <p style="font-size:24pt; color:#00ff00">This paragraph has the <em>font-size</em> and <em>color</em> styles applied to it, making it 24pt. and green.</p>
</body>
</html>
