<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CSS - EMBEDDED</title>
</head>
<body>
	<p style="position:absolute; top:20px; left:0px; font-size:20pt;">Left aligned text</p>
    <p style="position:relative; top:+3ex; left:+5ex; font-size:20pt;">Left position is shifted by 5 px</p>
</body>
</html>
