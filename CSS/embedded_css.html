<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded CSS</title>

    <style>
        em {
            background-color: #8000ff;
            color: white;
        }

        h1 {
            font-family: Arial, sans-serif;
        }

        p {
            font-size: 16pt;
        }

        .new {
            color: green;
        }
    </style>
</head>

<body>
    <h1 class="new">Format using "new" class defined in &lt;head&gt; tag</h1>

    <p>
        Even though <em>Hadoop is written in Java, programs do not need to be coded only in Java. 
        You can also use Python, Hive, Pig Latin, Impala, Scala, etc., using the Hadoop streaming interface.</em>
    </p>

</body>
</html>
