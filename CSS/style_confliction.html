<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CSS - EMBEDDED</title>

    <style type="text/css">
        em { color: green; }
        h1 { font-family: Arial, sans-serif; }
        p { font-size: 16pt; color: red; }

        /* Added missing class */
        .new { color: blue; }
    </style>

</head>
<body>

	<h1 class="new">Format using "new" class defined in the &lt;head&gt; tag</h1>

    <p>
        Even though <em>Hadoop Framework</em> is written in Java, programs for Hadoop need not be coded only in Java, 
        but one can also write in other languages like Python, Hive, Pig Latin, Impala, Scala, etc. 
        using the Hadoop streaming interface.
    </p>

</body>
</html>
