<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Setting Font Size</title>
    </head>
    <body>
        <font size="1">This text is in font size 1</font><br>
        <font size="2">This text is in font size 2</font><br>
        <font size="3">This text is in font size 3</font><br>
        <font size="-1">This text is in font size 3-1=2</font><br>
        <font size="+3">This text is in font size 3+3=6</font><br>
        <font size="+4">This text is in font size 3+4=7</font><br>
        <font size="-2">This text is in font size 3-2=1</font><br>
    </body>
</html>
