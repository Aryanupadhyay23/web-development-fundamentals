<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University Registration Form</title>
</head>

<body>

<h1>University Registration Form</h1>
<p>Please fill out the form</p>
<hr>

<form>

<h2>Personal Details</h2>

<label for="fname">First Name:</label>
<input type="text" name="fname" id="fname" placeholder="e.g: Aryan" required>

<br><br>

<label for="lname">Last Name:</label>
<input type="text" name="lname" id="lname" placeholder="e.g: Upadhyay">

<br><br>

<label for="dob">DOB:</label>
<input type="date" name="dob" id="dob">

<br><br>

<h3>Gender</h3>

<label for="male">Male</label>
<input type="radio" name="gender" id="male" value="male">

<br><br>

<label for="female">Female</label>
<input type="radio" name="gender" id="female" value="female">

<br><br>

<label for="other">Other</label>
<input type="radio" name="gender" id="other" value="other">

<br><br>

<h3>Upload your photo</h3>
<input type="file" name="photo">

<hr>

<h2>Contact Information</h2>

<label for="email">Email Address:</label>
<input type="email" id="email" name="email">

<br><br>

<label for="phone">Phone:</label>
<input type="tel" id="phone" name="phone">

<br><br>

<label for="address">Mailing Address:</label>
<br>
<textarea name="address" id="address" rows="4" cols="30"></textarea>

<hr>

<h2>Academic Information</h2>

<label for="course">Select Course:</label>
<select name="course" id="course">
<option value="CSE">CSE</option>
<option value="Civil">Civil</option>
<option value="Mechanical">Mechanical</option>
</select>

<br><br>

<h3>Extracurricular Activities</h3>

<label for="sports">Sports</label>
<input type="checkbox" name="interest" id="sports" value="Sports">

<br><br>

<label for="music">Music & Arts</label>
<input type="checkbox" name="interest" id="music" value="Music & Arts">

<br><br>

<label for="tech">Technology Clubs</label>
<input type="checkbox" name="interest" id="tech" value="Technology Clubs">

<br><br>

<label for="volunteer">Volunteering</label>
<input type="checkbox" name="interest" id="volunteer" value="Volunteering">

<hr>

<h2>Create your account</h2>

<label for="password">Create your password:</label>
<input type="password" name="password" id="password">

<hr>

<h2>Security Question</h2>

<label for="security_question">Choose a security question:</label>

<select name="security_question" id="security_question">
<option value="">--Select a Question--</option>
<option value="pet">What was the name of your first pet?</option>
<option value="school">What is the name of your first school?</option>
<option value="city">In which city were you born?</option>
<option value="teacher">Who was your favorite teacher?</option>
</select>

<br><br>

<label for="security_answer">Your Answer:</label>
<input type="text" name="security_answer" id="security_answer">

<hr>

<h2>Form Actions</h2>

<button type="submit">Register</button>
<button type="reset">Reset Form</button>
<button type="button">Cancel</button>

</form>

</body>
</html>
