<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>HTML div Tag</title>
    </head>
    <body>
    <!-- First group of tags in blue color-->
    <div style="color:blue">
    <h4>This is first group of elements</h4>
    <p>Following is a list of languages</p>
    <ul>
    <li>Hindi</li>
    <li>English</li>
    <li>Arabic</li>
    </ul>
    </div>
    <!--Second group of tags in different color-->
    <div style="color:red">
    <h4>This is second group of elements</h4>
    <p>Following is a list of Computer Languages</p>
    <ul>
    <li>ADA</li>
    <li>Basic</li>
    <li>C</li>
    <li>C++</li>
    </ul>
    </div>
    </body>
</html>
